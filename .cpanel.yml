---
deployment:
  tasks:
    - export DEPLOYPATH=/home1/hg9a3205/cursoseloha.online/
    - /bin/mkdir -p $DEPLOYPATH/server
    - /bin/mkdir -p $DEPLOYPATH/client/dist
    - /usr/bin/rsync -av --exclude="node_modules" --exclude=".git" server/ $DEPLOYPATH/server/
    - /usr/bin/rsync -av client/dist/ $DEPLOYPATH/client/dist/
    - echo "Deploy efetuado com sucesso via cPanel Git!"
